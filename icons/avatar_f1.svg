<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Background -->
  <circle cx="40" cy="40" r="40" fill="#1e5fa8"/>
  <!-- Hair behind/long dark -->
  <path fill="#2d1505" d="M29 72 Q24 52 26 30 Q26 14 40 13 Q54 14 54 30 Q56 52 51 72 Q47 76 43 73 Q40 70 40 70 Q40 70 37 73 Q33 76 29 72z"/>
  <!-- Shirt -->
  <path fill="#0f4080" d="M12 80 Q12 60 40 58 Q68 60 68 80z"/>
  <!-- Neck -->
  <rect x="36" y="51" width="8" height="10" rx="2" fill="#f5c8a0"/>
  <!-- Ears -->
  <ellipse cx="27.5" cy="34" rx="2.5" ry="3.5" fill="#f5c8a0"/>
  <ellipse cx="52.5" cy="34" rx="2.5" ry="3.5" fill="#f5c8a0"/>
  <!-- Face -->
  <ellipse cx="40" cy="33" rx="13" ry="16" fill="#f5c8a0"/>
  <!-- Ear inner -->
  <ellipse cx="27.5" cy="34" rx="1.2" ry="2" fill="#d4a080"/>
  <ellipse cx="52.5" cy="34" rx="1.2" ry="2" fill="#d4a080"/>
  <!-- Eyebrows (arched, feminine) -->
  <path d="M30.5 27.5 Q34 25 37.5 27" stroke="#2d1505" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M42.5 27 Q46 25 49.5 27.5" stroke="#2d1505" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Eyes white -->
  <ellipse cx="34" cy="31.5" rx="3.2" ry="2.8" fill="#fff"/>
  <ellipse cx="46" cy="31.5" rx="3.2" ry="2.8" fill="#fff"/>
  <!-- Iris -->
  <circle cx="34.2" cy="32" r="2" fill="#3d2010"/>
  <circle cx="46.2" cy="32" r="2" fill="#3d2010"/>
  <!-- Pupil -->
  <circle cx="34.2" cy="32" r="1.1" fill="#080808"/>
  <circle cx="46.2" cy="32" r="1.1" fill="#080808"/>
  <!-- Highlight -->
  <circle cx="34.9" cy="31.2" r="0.65" fill="#fff"/>
  <circle cx="46.9" cy="31.2" r="0.65" fill="#fff"/>
  <!-- Eyelash hint -->
  <path d="M30.8 29.5 Q34 28 37.2 29.5" stroke="#2d1505" stroke-width="1.1" fill="none" stroke-linecap="round"/>
  <path d="M42.8 29.5 Q46 28 49.2 29.5" stroke="#2d1505" stroke-width="1.1" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M38.5 38 Q40 40.5 41.5 38" stroke="#c49070" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- Mouth (lipstick tint) -->
  <path d="M35.5 43.5 Q40 47.5 44.5 43.5" stroke="#c03050" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Blush -->
  <ellipse cx="28.5" cy="38" rx="4" ry="2.5" fill="#f08060" opacity="0.22"/>
  <ellipse cx="51.5" cy="38" rx="4" ry="2.5" fill="#f08060" opacity="0.22"/>
</svg>

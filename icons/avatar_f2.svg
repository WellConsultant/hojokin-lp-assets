<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Background -->
  <circle cx="40" cy="40" r="40" fill="#6c3483"/>
  <!-- Hair behind (medium auburn-brown) -->
  <path fill="#6b3520" d="M30 68 Q25 50 27 30 Q27 14 40 13 Q53 14 53 30 Q55 50 50 68 Q47 72 43 70 Q40 67 40 67 Q40 67 37 70 Q33 72 30 68z"/>
  <!-- Shirt -->
  <path fill="#4a235a" d="M12 80 Q12 60 40 58 Q68 60 68 80z"/>
  <!-- Neck -->
  <rect x="36" y="51" width="8" height="10" rx="2" fill="#f0c4a0"/>
  <!-- Ears -->
  <ellipse cx="27.5" cy="34" rx="2.5" ry="3.5" fill="#f0c4a0"/>
  <ellipse cx="52.5" cy="34" rx="2.5" ry="3.5" fill="#f0c4a0"/>
  <!-- Face -->
  <ellipse cx="40" cy="33" rx="13" ry="16" fill="#f0c4a0"/>
  <!-- Ear inner -->
  <ellipse cx="27.5" cy="34" rx="1.2" ry="2" fill="#cc9070"/>
  <ellipse cx="52.5" cy="34" rx="1.2" ry="2" fill="#cc9070"/>
  <!-- Eyebrows -->
  <path d="M30.5 27.5 Q34 25.5 37.5 27.5" stroke="#5a2a10" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M42.5 27.5 Q46 25.5 49.5 27.5" stroke="#5a2a10" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Eyes white -->
  <ellipse cx="34" cy="31.5" rx="3.2" ry="2.8" fill="#fff"/>
  <ellipse cx="46" cy="31.5" rx="3.2" ry="2.8" fill="#fff"/>
  <!-- Iris -->
  <circle cx="34.2" cy="32" r="2" fill="#4a2808"/>
  <circle cx="46.2" cy="32" r="2" fill="#4a2808"/>
  <!-- Pupil -->
  <circle cx="34.2" cy="32" r="1.1" fill="#080808"/>
  <circle cx="46.2" cy="32" r="1.1" fill="#080808"/>
  <!-- Highlight -->
  <circle cx="34.9" cy="31.2" r="0.65" fill="#fff"/>
  <circle cx="46.9" cy="31.2" r="0.65" fill="#fff"/>
  <!-- Eyelash hint -->
  <path d="M30.8 29.5 Q34 28 37.2 29.5" stroke="#5a2a10" stroke-width="1.1" fill="none" stroke-linecap="round"/>
  <path d="M42.8 29.5 Q46 28 49.2 29.5" stroke="#5a2a10" stroke-width="1.1" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M38.5 38 Q40 40.5 41.5 38" stroke="#b48060" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- Mouth -->
  <path d="M35.5 43.5 Q40 47 44.5 43.5" stroke="#b84060" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Blush -->
  <ellipse cx="28.5" cy="38" rx="4" ry="2.5" fill="#f08060" opacity="0.2"/>
  <ellipse cx="51.5" cy="38" rx="4" ry="2.5" fill="#f08060" opacity="0.2"/>
</svg>

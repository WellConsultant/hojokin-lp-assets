<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">

  <!-- 背景 -->
  <rect width="800" height="400" fill="#eef2f7" rx="14"/>

  <!-- ヘッダー -->
  <rect width="800" height="54" fill="#0f2d52" rx="14"/>
  <rect y="40" width="800" height="14" fill="#0f2d52"/>
  <text x="400" y="33" text-anchor="middle" fill="white" font-family="'Noto Sans JP',Arial,sans-serif" font-size="17" font-weight="bold" letter-spacing="1">補助金申請の全工程 ─ 全部、当事務所が代行します</text>

  <!-- ===================== ROW 1：申請フェーズ ===================== -->

  <!-- ラベル -->
  <rect x="20" y="66" width="98" height="20" fill="#0f2d52" rx="10"/>
  <text x="69" y="80" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="11" font-weight="bold">申請フェーズ</text>

  <!-- STEP 1 補助金選定 x=20 -->
  <rect x="20" y="92" width="158" height="80" fill="white" rx="8"/>
  <rect x="20" y="92" width="158" height="26" fill="#0f2d52" rx="8"/>
  <rect x="20" y="108" width="158" height="10" fill="#0f2d52"/>
  <text x="99" y="109" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="11" font-weight="bold">STEP 1</text>
  <text x="99" y="140" text-anchor="middle" fill="#0f2d52" font-family="'Noto Sans JP',Arial,sans-serif" font-size="14" font-weight="bold">補助金選定</text>
  <text x="99" y="160" text-anchor="middle" fill="#888" font-family="Arial,sans-serif" font-size="10">申請対象の確認・提案</text>

  <!-- 矢印 1→2 -->
  <polygon points="184,127 196,132 184,137" fill="#b0bec5"/>
  <line x1="178" y1="132" x2="184" y2="132" stroke="#b0bec5" stroke-width="2"/>

  <!-- STEP 2 事業計画書作成 x=198 -->
  <rect x="198" y="92" width="158" height="80" fill="white" rx="8"/>
  <rect x="198" y="92" width="158" height="26" fill="#1e5fa8" rx="8"/>
  <rect x="198" y="108" width="158" height="10" fill="#1e5fa8"/>
  <text x="277" y="109" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="11" font-weight="bold">STEP 2</text>
  <text x="277" y="137" text-anchor="middle" fill="#0f2d52" font-family="'Noto Sans JP',Arial,sans-serif" font-size="13" font-weight="bold">事業計画書</text>
  <text x="277" y="155" text-anchor="middle" fill="#0f2d52" font-family="'Noto Sans JP',Arial,sans-serif" font-size="13" font-weight="bold">作成</text>

  <!-- 矢印 2→3 -->
  <polygon points="362,127 374,132 362,137" fill="#b0bec5"/>
  <line x1="356" y1="132" x2="362" y2="132" stroke="#b0bec5" stroke-width="2"/>

  <!-- STEP 3 書類整備 x=376 -->
  <rect x="376" y="92" width="158" height="80" fill="white" rx="8"/>
  <rect x="376" y="92" width="158" height="26" fill="#e8821a" rx="8"/>
  <rect x="376" y="108" width="158" height="10" fill="#e8821a"/>
  <text x="455" y="109" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="11" font-weight="bold">STEP 3</text>
  <text x="455" y="140" text-anchor="middle" fill="#0f2d52" font-family="'Noto Sans JP',Arial,sans-serif" font-size="14" font-weight="bold">書類整備</text>
  <text x="455" y="160" text-anchor="middle" fill="#888" font-family="Arial,sans-serif" font-size="10">申請書類の確認・準備</text>

  <!-- 矢印 3→4 -->
  <polygon points="540,127 552,132 540,137" fill="#b0bec5"/>
  <line x1="534" y1="132" x2="540" y2="132" stroke="#b0bec5" stroke-width="2"/>

  <!-- STEP 4 電子申請サポート x=554 -->
  <rect x="554" y="92" width="158" height="80" fill="white" rx="8"/>
  <rect x="554" y="92" width="158" height="26" fill="#27ae60" rx="8"/>
  <rect x="554" y="108" width="158" height="10" fill="#27ae60"/>
  <text x="633" y="109" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="11" font-weight="bold">STEP 4</text>
  <text x="633" y="137" text-anchor="middle" fill="#0f2d52" font-family="'Noto Sans JP',Arial,sans-serif" font-size="13" font-weight="bold">電子申請</text>
  <text x="633" y="155" text-anchor="middle" fill="#0f2d52" font-family="'Noto Sans JP',Arial,sans-serif" font-size="13" font-weight="bold">サポート</text>

  <!-- ===================== 採択バッジ ===================== -->
  <line x1="400" y1="172" x2="400" y2="186" stroke="#b0bec5" stroke-width="2"/>
  <polygon points="395,186 400,194 405,186" fill="#b0bec5"/>
  <rect x="270" y="194" width="260" height="32" fill="#e8821a" rx="16"/>
  <text x="400" y="215" text-anchor="middle" fill="white" font-family="'Noto Sans JP',Arial,sans-serif" font-size="13" font-weight="bold">採　択</text>
  <line x1="400" y1="226" x2="400" y2="240" stroke="#b0bec5" stroke-width="2"/>
  <polygon points="395,240 400,248 405,240" fill="#b0bec5"/>

  <!-- ===================== ROW 2：採択後フェーズ ===================== -->

  <!-- ラベル -->
  <rect x="20" y="250" width="110" height="20" fill="#1e5fa8" rx="10"/>
  <text x="75" y="264" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="11" font-weight="bold">採択後フェーズ</text>

  <!-- STEP 5 交付申請 x=20 -->
  <rect x="20" y="276" width="158" height="80" fill="white" rx="8"/>
  <rect x="20" y="276" width="158" height="26" fill="#0d8a7a" rx="8"/>
  <rect x="20" y="292" width="158" height="10" fill="#0d8a7a"/>
  <text x="99" y="293" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="11" font-weight="bold">STEP 5</text>
  <text x="99" y="324" text-anchor="middle" fill="#0f2d52" font-family="'Noto Sans JP',Arial,sans-serif" font-size="14" font-weight="bold">交付申請</text>
  <text x="99" y="344" text-anchor="middle" fill="#888" font-family="Arial,sans-serif" font-size="10">採択後の手続き対応</text>

  <!-- 矢印 5→6 -->
  <polygon points="184,311 196,316 184,321" fill="#b0bec5"/>
  <line x1="178" y1="316" x2="184" y2="316" stroke="#b0bec5" stroke-width="2"/>

  <!-- STEP 6 実績報告 x=198 -->
  <rect x="198" y="276" width="158" height="80" fill="white" rx="8"/>
  <rect x="198" y="276" width="158" height="26" fill="#6c3483" rx="8"/>
  <rect x="198" y="292" width="158" height="10" fill="#6c3483"/>
  <text x="277" y="293" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="11" font-weight="bold">STEP 6</text>
  <text x="277" y="324" text-anchor="middle" fill="#0f2d52" font-family="'Noto Sans JP',Arial,sans-serif" font-size="14" font-weight="bold">実績報告</text>
  <text x="277" y="344" text-anchor="middle" fill="#888" font-family="Arial,sans-serif" font-size="10">経費・成果の報告</text>

  <!-- 矢印 6→7 -->
  <polygon points="362,311 374,316 362,321" fill="#b0bec5"/>
  <line x1="356" y1="316" x2="362" y2="316" stroke="#b0bec5" stroke-width="2"/>

  <!-- STEP 7 効果状況報告 x=376 -->
  <rect x="376" y="276" width="158" height="80" fill="white" rx="8"/>
  <rect x="376" y="276" width="158" height="26" fill="#1e5fa8" rx="8"/>
  <rect x="376" y="292" width="158" height="10" fill="#1e5fa8"/>
  <text x="455" y="293" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="11" font-weight="bold">STEP 7</text>
  <text x="455" y="321" text-anchor="middle" fill="#0f2d52" font-family="'Noto Sans JP',Arial,sans-serif" font-size="13" font-weight="bold">効果状況</text>
  <text x="455" y="339" text-anchor="middle" fill="#0f2d52" font-family="'Noto Sans JP',Arial,sans-serif" font-size="13" font-weight="bold">報告</text>

  <!-- 矢印 7→8 -->
  <polygon points="540,311 552,316 540,321" fill="#b0bec5"/>
  <line x1="534" y1="316" x2="540" y2="316" stroke="#b0bec5" stroke-width="2"/>

  <!-- STEP 8 事務局問い合わせ対応 x=554 -->
  <rect x="554" y="276" width="158" height="80" fill="white" rx="8"/>
  <rect x="554" y="276" width="158" height="26" fill="#e8821a" rx="8"/>
  <rect x="554" y="292" width="158" height="10" fill="#e8821a"/>
  <text x="633" y="293" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="11" font-weight="bold">STEP 8</text>
  <text x="633" y="321" text-anchor="middle" fill="#0f2d52" font-family="'Noto Sans JP',Arial,sans-serif" font-size="13" font-weight="bold">事務局</text>
  <text x="633" y="339" text-anchor="middle" fill="#0f2d52" font-family="'Noto Sans JP',Arial,sans-serif" font-size="13" font-weight="bold">問い合わせ対応</text>

  <!-- ===================== フッター ===================== -->
  <rect x="20" y="368" width="760" height="24" fill="#0f2d52" rx="12"/>
  <text x="400" y="384" text-anchor="middle" fill="white" font-family="'Noto Sans JP',Arial,sans-serif" font-size="12" font-weight="bold">全 8 ステップ ─ あなたはヒアリングに答えるだけ。あとは全部代行します。</text>

</svg>
